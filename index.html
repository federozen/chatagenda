<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Agenda Deportiva</title>
<style>
  :root {
    --bg: #0f1117;
    --surface: #1a1d27;
    --surface2: #22263a;
    --border: #2d3250;
    --accent: #4f8ef7;
    --accent2: #7c3aed;
    --green: #22c55e;
    --orange: #f97316;
    --red: #ef4444;
    --text: #e8eaf0;
    --muted: #6b7280;
    --pill-bg: #1e2235;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: var(--bg); color: var(--text); font-family: 'Segoe UI', system-ui, sans-serif; min-height: 100vh; display: flex; flex-direction: column; }

  header {
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    padding: 14px 20px;
    display: flex;
    align-items: center;
    gap: 12px;
    position: sticky; top: 0; z-index: 100;
  }
  .logo { font-size: 22px; }
  .title { font-size: 17px; font-weight: 700; letter-spacing: -0.3px; }
  .subtitle { font-size: 12px; color: var(--muted); }
  .header-right { margin-left: auto; display: flex; align-items: center; gap: 10px; }
  .week-badge {
    background: var(--pill-bg);
    border: 1px solid var(--border);
    padding: 4px 12px;
    border-radius: 20px;
    font-size: 12px;
    color: var(--muted);
  }
  .upload-btn {
    background: var(--accent2);
    color: white;
    border: none;
    padding: 7px 14px;
    border-radius: 8px;
    font-size: 13px;
    cursor: pointer;
    font-weight: 600;
    display: flex; align-items: center; gap: 6px;
  }
  .upload-btn:hover { opacity: 0.85; }

  /* MAIN LAYOUT */
  .container { flex: 1; display: flex; flex-direction: column; max-width: 820px; margin: 0 auto; width: 100%; padding: 0 16px 100px; }

  /* CHAT */
  .chat-area {
    flex: 1;
    padding: 20px 0;
    display: flex;
    flex-direction: column;
    gap: 16px;
    min-height: 300px;
  }

  .msg {
    display: flex;
    gap: 10px;
    animation: fadeIn 0.25s ease;
  }
  @keyframes fadeIn { from { opacity:0; transform:translateY(6px) } to { opacity:1; transform:translateY(0) } }
  .msg.user { flex-direction: row-reverse; }
  .avatar {
    width: 34px; height: 34px;
    border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-size: 16px;
    flex-shrink: 0;
    margin-top: 2px;
  }
  .avatar.bot { background: linear-gradient(135deg, var(--accent), var(--accent2)); }
  .avatar.user { background: var(--surface2); }
  .bubble {
    max-width: 85%;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 12px 16px;
    font-size: 14px;
    line-height: 1.55;
  }
  .msg.user .bubble { background: var(--accent2); border-color: transparent; }

  /* MATCH CARDS */
  .matches-grid { display: flex; flex-direction: column; gap: 8px; margin-top: 10px; }
  .match-card {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 10px 14px;
    display: grid;
    grid-template-columns: 1fr auto;
    gap: 4px;
    align-items: center;
  }
  .match-main { display: flex; flex-direction: column; gap: 3px; }
  .match-teams { font-size: 14px; font-weight: 600; color: var(--text); }
  .match-meta { font-size: 12px; color: var(--muted); display: flex; gap: 8px; flex-wrap: wrap; align-items: center; }
  .match-right { text-align: right; }
  .match-time { font-size: 17px; font-weight: 700; color: var(--accent); font-variant-numeric: tabular-nums; }
  .match-date { font-size: 11px; color: var(--muted); }
  .tag {
    display: inline-block;
    padding: 2px 8px;
    border-radius: 20px;
    font-size: 11px;
    font-weight: 600;
    background: var(--pill-bg);
    border: 1px solid var(--border);
  }
  .tag.directv { color: #60a5fa; border-color: #1d4ed860; }
  .tag.flow { color: #a78bfa; border-color: #5b21b660; }
  .canal-badge {
    display: inline-block;
    background: #1e293b;
    border: 1px solid #334155;
    color: #94a3b8;
    padding: 2px 8px;
    border-radius: 6px;
    font-size: 11px;
    font-weight: 600;
    margin-top: 4px;
  }
  .result-count { font-size: 13px; color: var(--muted); margin-bottom: 4px; }

  /* QUICK CHIPS */
  .chips-row { display: flex; gap: 8px; flex-wrap: wrap; margin-top: 4px; }
  .chip {
    background: var(--surface2);
    border: 1px solid var(--border);
    color: var(--text);
    padding: 6px 14px;
    border-radius: 20px;
    font-size: 13px;
    cursor: pointer;
    transition: all 0.15s;
  }
  .chip:hover { background: var(--accent); border-color: var(--accent); color: white; }

  /* INPUT BAR */
  .input-bar {
    position: fixed;
    bottom: 0; left: 0; right: 0;
    background: var(--surface);
    border-top: 1px solid var(--border);
    padding: 12px 16px;
    display: flex;
    gap: 10px;
    align-items: flex-end;
    z-index: 100;
  }
  .input-wrap { flex: 1; display: flex; gap: 10px; max-width: 820px; margin: 0 auto; width: 100%; }
  .input-bar input {
    flex: 1;
    background: var(--surface2);
    border: 1px solid var(--border);
    color: var(--text);
    padding: 10px 16px;
    border-radius: 24px;
    font-size: 14px;
    outline: none;
    transition: border-color 0.15s;
  }
  .input-bar input:focus { border-color: var(--accent); }
  .input-bar input::placeholder { color: var(--muted); }
  .send-btn {
    background: var(--accent);
    border: none;
    color: white;
    width: 40px; height: 40px;
    border-radius: 50%;
    font-size: 18px;
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0;
    transition: opacity 0.15s;
  }
  .send-btn:hover { opacity: 0.85; }

  /* UPLOAD MODAL */
  .modal-overlay {
    display: none;
    position: fixed; inset: 0;
    background: rgba(0,0,0,0.7);
    z-index: 200;
    align-items: center;
    justify-content: center;
  }
  .modal-overlay.open { display: flex; }
  .modal {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 28px;
    max-width: 480px;
    width: 90%;
  }
  .modal h2 { font-size: 18px; margin-bottom: 6px; }
  .modal p { color: var(--muted); font-size: 13px; margin-bottom: 20px; }
  .drop-zone {
    border: 2px dashed var(--border);
    border-radius: 10px;
    padding: 30px;
    text-align: center;
    cursor: pointer;
    transition: border-color 0.15s, background 0.15s;
    margin-bottom: 16px;
  }
  .drop-zone:hover, .drop-zone.drag { border-color: var(--accent); background: #1d2035; }
  .drop-zone input[type=file] { display: none; }
  .drop-zone .dz-icon { font-size: 32px; margin-bottom: 8px; }
  .drop-zone .dz-text { font-size: 14px; color: var(--muted); }
  .drop-zone .dz-hint { font-size: 12px; color: var(--muted); margin-top: 4px; }
  .file-list { display: flex; flex-direction: column; gap: 8px; margin-bottom: 16px; }
  .file-item {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 10px 14px;
    font-size: 13px;
    display: flex; align-items: center; gap: 10px;
  }
  .file-item .fi-name { flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .file-item .fi-status { font-size: 11px; color: var(--green); font-weight: 600; }
  .modal-actions { display: flex; gap: 10px; justify-content: flex-end; }
  .btn { padding: 9px 20px; border-radius: 8px; font-size: 14px; cursor: pointer; border: none; font-weight: 600; }
  .btn-cancel { background: var(--surface2); color: var(--muted); border: 1px solid var(--border); }
  .btn-primary { background: var(--accent); color: white; }
  .btn:hover { opacity: 0.85; }

  .empty-state { text-align: center; padding: 40px 20px; color: var(--muted); }
  .empty-state .es-icon { font-size: 48px; margin-bottom: 12px; }

  .typing { display: flex; gap: 4px; align-items: center; padding: 4px 0; }
  .dot { width: 7px; height: 7px; background: var(--muted); border-radius: 50%; animation: bounce 1.4s infinite; }
  .dot:nth-child(2) { animation-delay: 0.2s; }
  .dot:nth-child(3) { animation-delay: 0.4s; }
  @keyframes bounce { 0%,80%,100% { transform: translateY(0) } 40% { transform: translateY(-6px) } }

  .no-data-warning {
    background: #1f1a10;
    border: 1px solid #78350f;
    border-radius: 10px;
    padding: 12px 16px;
    font-size: 13px;
    color: #fbbf24;
    margin-bottom: 12px;
    display: flex; gap: 10px; align-items: flex-start;
  }
</style>
</head>
<body>

<header>
  <div class="logo">📺</div>
  <div>
    <div class="title">Agenda Deportiva</div>
    <div class="subtitle">DIRECTV + Flow Argentina</div>
  </div>
  <div class="header-right">
    <div class="week-badge" id="weekLabel">Sin datos cargados</div>
    <button class="upload-btn" onclick="openModal()">⬆ Subir semana</button>
  </div>
</header>

<div class="container">
  <div class="chat-area" id="chatArea"></div>
</div>

<div class="input-bar">
  <div class="input-wrap">
    <input type="text" id="userInput" placeholder="¿Qué querés ver esta semana? Ej: fútbol del domingo, F1, Argentina..." autocomplete="off" />
    <button class="send-btn" onclick="sendMessage()">➤</button>
  </div>
</div>

<!-- UPLOAD MODAL -->
<div class="modal-overlay" id="modalOverlay">
  <div class="modal">
    <h2>📂 Subir agenda semanal</h2>
    <p>Subí los archivos Excel de la semana. Reemplazarán la agenda anterior automáticamente.</p>
    <div class="drop-zone" id="dropZone" onclick="document.getElementById('fileInput').click()">
      <input type="file" id="fileInput" accept=".xlsx,.xls" multiple onchange="handleFiles(this.files)" />
      <div class="dz-icon">📊</div>
      <div class="dz-text">Hacé clic o arrastrá los archivos aquí</div>
      <div class="dz-hint">Acepta .xlsx — DIRECTV y/o Flow</div>
    </div>
    <div class="file-list" id="fileList"></div>
    <div class="modal-actions">
      <button class="btn btn-cancel" onclick="closeModal()">Cancelar</button>
      <button class="btn btn-primary" onclick="processFiles()" id="processBtn" disabled>Cargar agenda ✓</button>
    </div>
  </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<script>
// ========================
// STORAGE
// ========================
const STORAGE_KEY = 'agenda_deportiva_v2';

function saveData(data) {
  try { window.storage.set(STORAGE_KEY, JSON.stringify(data), false); } catch(e) {}
  localStorage.setItem(STORAGE_KEY, JSON.stringify(data));
}

async function loadData() {
  try {
    const r = await window.storage.get(STORAGE_KEY, false);
    if (r && r.value) return JSON.parse(r.value);
  } catch(e) {}
  const local = localStorage.getItem(STORAGE_KEY);
  return local ? JSON.parse(local) : null;
}

// ========================
// STATE
// ========================
let agendaData = { events: [], weekLabel: '', loadedAt: null };
let pendingFiles = [];

// ========================
// EXCEL PARSING
// ========================
function parseExcel(file) {
  return new Promise((resolve, reject) => {
    const reader = new FileReader();
    reader.onload = e => {
      try {
        const wb = XLSX.read(e.target.result, { type: 'array', cellDates: true });
        resolve({ wb, name: file.name });
      } catch(err) { reject(err); }
    };
    reader.readAsArrayBuffer(file);
  });
}

function detectFileType(wb, filename) {
  const sheets = wb.SheetNames;
  const fn = filename.toLowerCase();
  if (fn.includes('directv') || fn.includes('programaci')) return 'directv';
  if (sheets.includes('Argentina') || fn.includes('semana') || fn.includes('flow')) return 'flow';
  // Fallback: check sheet names
  if (sheets.includes('Deportes_Argentina')) return 'directv';
  return 'unknown';
}

const DAY_MAP = {
  'viernes 27': '2026-03-27','sábado 28': '2026-03-28','sabado 28': '2026-03-28',
  'domingo 29': '2026-03-29','lunes 30': '2026-03-30','martes 31': '2026-03-31',
  'miércoles 1': '2026-04-01','miercoles 1': '2026-04-01',
  'jueves 2': '2026-04-02','viernes 3': '2026-04-03',
};

function dayToDate(str) {
  if (!str) return null;
  const key = String(str).trim().toLowerCase();
  if (DAY_MAP[key]) return DAY_MAP[key];
  // Try generic mapping
  const days = ['lunes','martes','miércoles','miercoles','jueves','viernes','sábado','sabado','domingo'];
  for (const d of days) {
    if (key.startsWith(d)) {
      const num = key.replace(d,'').trim();
      if (num) {
        // Guess month (March/April context)
        const n = parseInt(num);
        if (n >= 27) return `2026-03-${n.toString().padStart(2,'0')}`;
        if (n <= 7) return `2026-04-0${n}`;
      }
    }
  }
  return null;
}

function parseDirectv(wb) {
  const sheet = wb.Sheets['Deportes_Argentina'] || wb.Sheets[wb.SheetNames[0]];
  const rows = XLSX.utils.sheet_to_json(sheet, { defval: '' });
  const events = [];
  for (const r of rows) {
    const dia = r['DIA'] || r['DIA '] || '';
    if (!dia) continue;
    let fecha = '';
    if (dia instanceof Date) {
      fecha = dia.toISOString().split('T')[0];
    } else {
      fecha = String(dia).split('T')[0];
    }
    if (!fecha || fecha === 'NaN-NaN-NaN') continue;
    const horario = r['HORARIO'] || '';
    const deporte = String(r['TIPO'] || '').toUpperCase().replace('FÚTBOL','FUTBOL').replace('BÁSQUET','BASQUET').replace('BÉISBOL','BEISBOL').replace('VÓLEY','VOLEY').replace('NATACIÓN','NATACION').replace('MOTOCICLISMO','MOTOCICLISMO').trim();
    const torneo = r['TORNEO'] || '';
    const local = r['LOCAL/ PROGRAMA'] || r['LOCAL/PROGRAMA'] || '';
    const visitante = r['VISITANTE'] || '';
    const canal = r['CANAL '] || r['CANAL'] || '';
    const sd = r['SD'] || '';
    const hd = r['HD'] || '';
    events.push({ fecha, horario, deporte, torneo, local: String(local), visitante: String(visitante), canal: String(canal), sd: String(sd), hd: String(hd), fuente: 'DIRECTV', info: '' });
  }
  return events;
}

function parseFlow(wb) {
  const sheetName = wb.SheetNames.includes('Argentina') ? 'Argentina' : wb.SheetNames[0];
  const sheet = wb.Sheets[sheetName];
  const rows = XLSX.utils.sheet_to_json(sheet, { defval: '', header: 1 });
  // Find header row
  let headerIdx = 0;
  for (let i = 0; i < rows.length; i++) {
    if (String(rows[i][0]).trim().toUpperCase() === 'FECHA') { headerIdx = i; break; }
  }
  const headers = rows[headerIdx];
  const events = [];
  for (let i = headerIdx + 1; i < rows.length; i++) {
    const row = rows[i];
    const obj = {};
    headers.forEach((h, idx) => { obj[String(h).trim()] = row[idx] ?? ''; });
    const fechaRaw = obj['FECHA'];
    if (!fechaRaw || String(fechaRaw).trim() === '' || String(fechaRaw).trim() === 'FECHA') continue;
    const fecha = dayToDate(String(fechaRaw));
    if (!fecha) continue;
    let horario = obj['HORA INICIO'] || '';
    if (horario instanceof Date) {
      const h = horario.getHours().toString().padStart(2,'0');
      const m = horario.getMinutes().toString().padStart(2,'0');
      horario = `${h}:${m}`;
    } else {
      horario = String(horario).replace(/^(\d{2}:\d{2}):\d{2}$/, '$1');
    }
    const deporte = String(obj['DEPORTE'] || '').toUpperCase().normalize('NFD').replace(/[\u0300-\u036f]/g,'').replace('FUTBOL','FUTBOL').replace('BASQUET','BASQUET').replace('VOLEY','VOLEY').trim();
    const torneo = String(obj['EVENTO'] || '');
    const info = String(obj['INFO'] || '');
    const canal = String(obj['CANAL'] || '');
    events.push({ fecha, horario, deporte, torneo, local: '', visitante: '', canal, sd: '', hd: '', fuente: 'Flow', info });
  }
  return events;
}

// ========================
// SEARCH ENGINE
// ========================
function normalizeStr(s) {
  return String(s||'').toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g,'').replace(/[^a-z0-9\s]/g,' ').trim();
}

const SPORT_ALIASES = {
  futbol: ['FUTBOL','FÚTBOL'],
  basquet: ['BASQUET','BÁSQUET','BASKETBALL'],
  rugby: ['RUGBY'],
  tenis: ['TENIS'],
  f1: ['AUTOMOVILISMO'], formula1: ['AUTOMOVILISMO'], formula: ['AUTOMOVILISMO'], automovilismo: ['AUTOMOVILISMO'],
  moto: ['MOTOCICLISMO'], motogp: ['MOTOCICLISMO'], motociclismo: ['MOTOCICLISMO'],
  boxeo: ['BOXEO'],
  beisbol: ['BEISBOL','BÉISBOL'],
  voley: ['VOLEY','VÓLEY'],
  ciclismo: ['CICLISMO'],
  natacion: ['NATACION','NATACIÓN'],
  hockey: ['HOCKEY SOBRE HIELO'],
  mma: ['MMA'],
  padel: ['PADEL'],
  handball: ['HANDBALL'],
  egames: ['EGAMES'],
};

const DAY_ALIASES = {
  hoy: null, // set dynamically
  manana: 1, mañana: 1,
  lunes: 'lunes', martes: 'martes', miercoles: 'miercoles', miércoles: 'miercoles',
  jueves: 'jueves', viernes: 'viernes', sabado: 'sabado', sábado: 'sabado', domingo: 'domingo',
};

const DAY_NAMES_ES = ['domingo','lunes','martes','miercoles','jueves','viernes','sabado'];

function getWeekDates(events) {
  const dates = [...new Set(events.map(e => e.fecha))].sort();
  return dates;
}

function parseQuery(query) {
  const q = normalizeStr(query);
  const result = { sports: [], dates: [], teams: [], canales: [], texto: q };

  // Sport detection
  for (const [alias, sportCodes] of Object.entries(SPORT_ALIASES)) {
    if (q.includes(alias)) result.sports.push(...sportCodes);
  }
  result.sports = [...new Set(result.sports)];

  // Day detection
  const weekDates = getWeekDates(agendaData.events);
  const today = new Date().toISOString().split('T')[0];

  if (q.includes('hoy') && weekDates.includes(today)) result.dates.push(today);
  if ((q.includes('manana') || q.includes('mañana')) && weekDates.length) {
    const todayIdx = weekDates.indexOf(today);
    if (todayIdx >= 0 && todayIdx < weekDates.length - 1) result.dates.push(weekDates[todayIdx+1]);
    else {
      const tomorrowDate = new Date(); tomorrowDate.setDate(tomorrowDate.getDate()+1);
      const tomorrow = tomorrowDate.toISOString().split('T')[0];
      if (weekDates.includes(tomorrow)) result.dates.push(tomorrow);
    }
  }

  const dayKeywords = ['lunes','martes','miercoles','miercoles','jueves','viernes','sabado','sabado','domingo'];
  const dayNumbers = [1,2,3,3,4,5,6,6,0];
  dayKeywords.forEach((day, i) => {
    if (q.includes(day)) {
      const targetDay = dayNumbers[i];
      weekDates.forEach(d => {
        const dt = new Date(d + 'T12:00:00');
        if (dt.getDay() === targetDay && !result.dates.includes(d)) result.dates.push(d);
      });
    }
  });

  return result;
}

function searchEvents(query) {
  const events = agendaData.events;
  if (!events.length) return { results: [], query };
  const parsed = parseQuery(query);
  const qNorm = parsed.texto;

  let filtered = [...events];

  // Filter by date
  if (parsed.dates.length) {
    filtered = filtered.filter(e => parsed.dates.includes(e.fecha));
  }

  // Filter by sport
  if (parsed.sports.length) {
    filtered = filtered.filter(e => parsed.sports.some(s => normalizeStr(e.deporte).includes(normalizeStr(s))));
  }

  // Text search across all fields if no sport/date matched a strong filter
  if (!parsed.sports.length && !parsed.dates.length) {
    filtered = filtered.filter(e => {
      const hay = normalizeStr([e.deporte, e.torneo, e.local, e.visitante, e.canal, e.info].join(' '));
      // Check each word
      const words = qNorm.split(/\s+/).filter(w => w.length > 2);
      return words.some(w => hay.includes(w));
    });
  } else if (parsed.sports.length || parsed.dates.length) {
    // Also filter by remaining text terms
    const remainingWords = qNorm.split(/\s+/).filter(w => {
      if (w.length <= 2) return false;
      const stopwords = ['ver','hoy','los','las','del','que','como','hay','este','esta','para','con','una','partido','partidos','juega','juegan','quiero','dame','dime','mostrame'];
      return !stopwords.includes(w);
    });
    // Remove sport words and day words
    const sportWords = Object.keys(SPORT_ALIASES);
    const dayWords = ['lunes','martes','miercoles','jueves','viernes','sabado','domingo','hoy','manana','manana'];
    const searchWords = remainingWords.filter(w => !sportWords.includes(w) && !dayWords.includes(w));
    if (searchWords.length > 0) {
      filtered = filtered.filter(e => {
        const hay = normalizeStr([e.deporte, e.torneo, e.local, e.visitante, e.canal, e.info].join(' '));
        return searchWords.some(w => hay.includes(w));
      });
    }
  }

  // Sort by date then time
  filtered.sort((a, b) => {
    if (a.fecha !== b.fecha) return a.fecha.localeCompare(b.fecha);
    return String(a.horario).localeCompare(String(b.horario));
  });

  return { results: filtered, query: parsed };
}

// ========================
// CHAT UI
// ========================
function appendMsg(role, content) {
  const area = document.getElementById('chatArea');
  const div = document.createElement('div');
  div.className = `msg ${role}`;
  const avatar = document.createElement('div');
  avatar.className = `avatar ${role}`;
  avatar.textContent = role === 'bot' ? '📺' : '👤';
  const bubble = document.createElement('div');

function formatDate(dateStr) {
  const d = new Date(dateStr + 'T12:00:00');
  return d.toLocaleDateString('es-AR', { weekday: 'long', day: 'numeric', month: 'long' });
}

function formatTime(horario) {
  if (!horario) return '';
  return String(horario).replace(' hs.', '').replace(':00', '').trim();
}

function buildMatchCards(events) {
  const container = document.createElement('div');
  const count = document.createElement('div');
  count.className = 'result-count';
  count.textContent = `${events.length} evento${events.length !== 1 ? 's' : ''} encontrado${events.length !== 1 ? 's' : ''}`;
  container.appendChild(count);
  const grid = document.createElement('div');
  grid.className = 'matches-grid';

  // Group by date
  const byDate = {};
  events.forEach(e => { if (!byDate[e.fecha]) byDate[e.fecha] = []; byDate[e.fecha].push(e); });

  for (const [fecha, evs] of Object.entries(byDate)) {
    if (Object.keys(byDate).length > 1) {
      const dayHeader = document.createElement('div');
      dayHeader.style.cssText = 'font-size:12px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:0.8px;padding:6px 2px 2px;';
      dayHeader.textContent = formatDate(fecha);
      grid.appendChild(dayHeader);
    }
    for (const ev of evs) {
      const card = document.createElement('div');
      card.className = 'match-card';

      const isMatch = ev.local && ev.visitante && ev.local !== 'nan' && ev.visitante !== 'nan';
      let title = '';
      if (isMatch) {
        title = `${ev.local} vs. ${ev.visitante}`;
      } else if (ev.info && ev.info !== '' && ev.info !== 'nan') {
        title = ev.info;
      } else if (ev.torneo) {
        title = ev.torneo;
      } else {
        title = ev.deporte;
      }

      const sportEmojis = { FUTBOL:'⚽', BASQUET:'🏀', RUGBY:'🏉', TENIS:'🎾', AUTOMOVILISMO:'🏎️', MOTOCICLISMO:'🏍️', BOXEO:'🥊', BEISBOL:'⚾', VOLEY:'🏐', CICLISMO:'🚴', NATACION:'🏊', MMA:'🥋', HOCKEY:'🏒', PADEL:'🎾', HANDBALL:'🤾', DEFAULT:'🏆' };
      const sportKey = Object.keys(sportEmojis).find(k => normalizeStr(ev.deporte).includes(normalizeStr(k))) || 'DEFAULT';
      const emoji = sportEmojis[sportKey];

      card.innerHTML = `
        <div class="match-main">
          <div class="match-teams">${emoji} ${title}</div>
          <div class="match-meta">
            <span>${ev.torneo !== title && ev.torneo && ev.torneo !== 'nan' ? ev.torneo : ev.deporte}</span>
            <span class="canal-badge">${ev.canal}</span>
            <span class="tag ${ev.fuente === 'DIRECTV' ? 'directv' : 'flow'}">${ev.fuente}</span>
          </div>
        </div>
        <div class="match-right">
          <div class="match-time">${formatTime(ev.horario)}</div>
          ${Object.keys(byDate).length === 1 ? '' : `<div class="match-date">${formatDate(fecha).split(', ')[0]}</div>`}
        </div>
      `;
      grid.appendChild(card);
    }
  }

  container.appendChild(grid);
  return container;
}

// ========================
async function askClaude(userQuery) {
  const today = new Date().toISOString().split('T')[0];
  const weekDates = getWeekDates(agendaData.events);

  // Build a compact agenda summary for the system prompt
  // Group events by date for readability
  const agendaLines = [];
  const byDate = {};
  agendaData.events.forEach(e => {
    if (!byDate[e.fecha]) byDate[e.fecha] = [];
    byDate[e.fecha].push(e);
  });

  for (const [fecha, evs] of Object.entries(byDate).sort()) {
    const d = new Date(fecha + 'T12:00:00');
    const dayName = d.toLocaleDateString('es-AR', { weekday: 'long', day: 'numeric', month: 'long' });
    agendaLines.push(`\n--- ${dayName.toUpperCase()} ---`);
    for (const ev of evs) {
      const teams = (ev.local && ev.visitante && ev.local !== 'nan' && ev.visitante !== 'nan')
        ? `${ev.local} vs. ${ev.visitante}` : (ev.info || ev.torneo || '');
      const hora = String(ev.horario).replace(' hs.','').trim();
      agendaLines.push(`[${hora}] ${ev.deporte} | ${ev.torneo} | ${teams} | Canal: ${ev.canal} | Fuente: ${ev.fuente}`);
    }
  }

  const systemPrompt = `Sos un asistente experto en deportes para un usuario argentino. Tu tarea es responder preguntas sobre la agenda deportiva televisiva de la semana.

HOY es: ${today}
SEMANA DISPONIBLE: ${weekDates[0]} al ${weekDates[weekDates.length-1]}

AGENDA COMPLETA:
${agendaLines.join('\n')}

INSTRUCCIONES:
- Respondé siempre en español rioplatense (vos, dale, etc.)
- Cuando el usuario pregunte por eventos, devolvé un JSON con este formato EXACTO (sin markdown, sin explicación extra, solo el JSON):
{
  "text": "respuesta conversacional breve",
  "event_ids": [lista de índices numéricos de los eventos relevantes de la agenda, basados en orden de aparición 0-indexed]
}
- Si la pregunta no tiene eventos asociados (ej: "¿cuántos partidos hay?", "¿qué deportes hay?"), devolvé solo texto:
{
  "text": "tu respuesta aquí",
  "event_ids": []
}
- Podés hacer recomendaciones, comparar horarios, explicar torneos, sugerir qué ver si hay superposición de horarios, etc.
- Si te preguntan qué canal ver, indicá el número SD o HD si está disponible.
- Siempre respondé en JSON válido.`;

  // Build messages with history
  const messages = [
    ...chatHistory,
    { role: 'user', content: userQuery }
  ];

  const response = await fetch('https://api.anthropic.com/v1/messages', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({
      model: 'claude-sonnet-4-20250514',
      max_tokens: 1000,
      system: systemPrompt,
      messages
    })
  });

  const data = await response.json();
  const rawText = data.content?.map(c => c.text || '').join('') || '';

  // Update history
  chatHistory.push({ role: 'user', content: userQuery });
  chatHistory.push({ role: 'assistant', content: rawText });
  // Keep last 10 turns to avoid token overflow
  if (chatHistory.length > 20) chatHistory = chatHistory.slice(-20);

  // Parse response
  try {
    const clean = rawText.replace(/```json|```/g, '').trim();
    const parsed = JSON.parse(clean);
    return parsed;
  } catch(e) {
    return { text: rawText, event_ids: [] };
  }
}

async function sendMessage() {
  const input = document.getElementById('userInput');
  const query = input.value.trim();
  if (!query) return;
  input.value = '';

  appendMsg('user', query);

  if (!agendaData.events.length) {
    appendMsg('bot', '⚠️ Todavía no hay agenda cargada. Hacé clic en <strong>⬆ Subir semana</strong> para cargar los archivos Excel.');
    return;
  }

  showTyping();

  let aiResponse;
  try {
    aiResponse = await askClaude(query);
  } catch(err) {
    removeTyping();
    // Fallback to keyword search
    const { results } = searchEvents(query);
    if (!results.length) {
      appendMsg('bot', `No encontré eventos para "<em>${query}</em>". Probá con otro deporte, equipo o día.`);
    } else {
      const content = document.createElement('div');
      content.appendChild(buildMatchCards(results));
      appendMsg('bot', content);
    }
    return;
  }

  removeTyping();

  // Build response: AI text + matching event cards
  const content = document.createElement('div');

  // AI text
  if (aiResponse.text) {
    const textDiv = document.createElement('div');
    textDiv.style.marginBottom = aiResponse.event_ids?.length ? '12px' : '0';
    // Simple markdown-like: **bold**
    textDiv.innerHTML = aiResponse.text.replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>');
    content.appendChild(textDiv);
  }

  // Event cards if any
  if (aiResponse.event_ids && aiResponse.event_ids.length > 0) {
    // Get events by index from full list
    const allEvents = agendaData.events;
    const selectedEvents = aiResponse.event_ids
      .map(i => allEvents[i])
      .filter(Boolean);

    if (selectedEvents.length > 0) {
      content.appendChild(buildMatchCards(selectedEvents));
    }
  }

  appendMsg('bot', content);
}

async function processFiles() {
  if (!pendingFiles.length) return;
  const btn = document.getElementById('processBtn');
  btn.textContent = 'Procesando...';
  btn.disabled = true;

  let allEvents = [];
  let weekLabel = '';

  for (const file of pendingFiles) {
    try {
      const { wb, name } = await parseExcel(file);
      const type = detectFileType(wb, name);
      let events = [];
      if (type === 'directv') events = parseDirectv(wb);
      else if (type === 'flow') events = parseFlow(wb);
      else {
        // Try both
        try { events = parseDirectv(wb); } catch(e) { events = parseFlow(wb); }
      }
      allEvents.push(...events);
    } catch(err) {
      console.error('Error parsing', file.name, err);
    }
  }

  if (allEvents.length) {
    allEvents = allEvents.filter(e => e.fecha && e.deporte);
    const dates = [...new Set(allEvents.map(e => e.fecha))].sort();
    if (dates.length >= 2) {
      weekLabel = `${formatDate(dates[0])} — ${formatDate(dates[dates.length-1])}`;
    } else if (dates.length === 1) {
      weekLabel = formatDate(dates[0]);
    }
    agendaData = { events: allEvents, weekLabel, loadedAt: new Date().toISOString() };
    saveData(agendaData);
    document.getElementById('weekLabel').textContent = weekLabel;
    pendingFiles = [];
    chatHistory = []; // Reset AI conversation history
    closeModal();
    // Announce
    const area = document.getElementById('chatArea');
    area.innerHTML = '';
    const welcome = appendMsg('bot', buildWelcome());
  } else {
    btn.textContent = 'Error — intentá de nuevo';
    btn.disabled = false;
  }
}
